<!DOCTYPE html>
<html>
<head>
    <title>Test Doudou</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Test de connexion</h1>
    <input type="text" id="nomDoudou" placeholder="Nom du doudou">
    <button id="monBouton">Enregistrer</button>
    <div id="debug" style="margin-top:20px; color:blue;">En attente...</div>

    <script>
        // 1. Déclaration directe
        const debug = document.getElementById('debug');
        debug.innerText = "Script chargé !";

        // 2. Ecouteur d'événement au lieu de onclick (c'est plus robuste)
        document.getElementById('monBouton').addEventListener('click', function() {
            debug.innerText = "Bouton cliqué, fonction lancée !";
            console.log("Le bouton a bien été cliqué");
            alert("Ça marche !");
        });
    </script>
</body>
</html>
